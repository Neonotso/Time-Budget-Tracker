<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bible Readers Signup QR (Header)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; color: #000; background: #fff; }
    .sheet { max-width: 900px; margin: 0 auto; text-align: center; border: 2px solid #000; padding: 20px; }
    .hero { width: 100%; max-width: 780px; border: 1px solid #ccc; margin: 0 auto 16px; display:block; }
    h1 { margin: 0 0 10px; font-size: 38px; }
    p { margin: 6px 0; font-size: 24px; }
    .qr { width: 420px; height: 420px; image-rendering: crisp-edges; margin: 16px 0 8px; }
    .url { font-size: 34px; font-weight: 700; letter-spacing: 0.5px; }
    .small { font-size: 18px; margin-top: 12px; }
    @media print {
      body { padding: 0; }
      .sheet { border: none; }
    }
  </style>
</head>
<body>
  <div class="sheet">
    <img class="hero" src="bible-readers-header.jpg" alt="8:1 The Word Among Us" />
    <h1>8:1 Bible Readers Signup</h1>
    <p>Scan the QR code or type this link:</p>
    <img class="qr" src="bible-readers-signup-qr-high-contrast.png" alt="Bible Readers Signup QR Code" />
    <div class="url">da.gd/bibleread</div>
    <div class="small">Works on phone or computer</div>
  </div>
</body>
</html>
